# ALUMNI MUTATIONS
# -------------------------------------------------------

mutation CreateAlumni(
  $nis: String!
  $nama: String!
  $tahunLulus: Int!
  $status: StatusAlumni!
  $institusi: String
  $jabatanAtauJurusan: String
  $email: String
  $telepon: String
  $alamat: String
  $prestasi: String
) @auth(level: PUBLIC) {
  alumni_insert(data: {
    nis: $nis
    nama: $nama
    tahunLulus: $tahunLulus
    status: $status
    institusi: $institusi
    jabatanAtauJurusan: $jabatanAtauJurusan
    email: $email
    telepon: $telepon
    alamat: $alamat
    prestasi: $prestasi
  })
}

mutation UpdateAlumni(
  $id: UUID!
  $status: StatusAlumni
  $institusi: String
  $jabatanAtauJurusan: String
  $email: String
  $telepon: String
  $alamat: String
  $prestasi: String
) @auth(level: PUBLIC) {
  alumni_update(id: $id, data: {
    status: $status
    institusi: $institusi
    jabatanAtauJurusan: $jabatanAtauJurusan
    email: $email
    telepon: $telepon
    alamat: $alamat
    prestasi: $prestasi
  })
}

mutation DeleteAlumni($id: UUID!) @auth(level: PUBLIC) {
  alumni_delete(id: $id)
}

# -------------------------------------------------------
# DANGEROUS RESET MUTATIONS
# -------------------------------------------------------

mutation ResetDatabase @auth(level: PUBLIC) {
  nilai_deleteMany(all: true)
  jadwal_deleteMany(all: true)
  prestasi_deleteMany(all: true)
  kehadiran_deleteMany(all: true)
  pengumuman_deleteMany(all: true)
  alumni_deleteMany(all: true)
  siswa_deleteMany(all: true)
  guru_deleteMany(all: true)
  kelas_deleteMany(all: true)
  jurusan_deleteMany(all: true)
  mataPelajaran_deleteMany(all: true)
  pengguna_deleteMany(all: true)
}
