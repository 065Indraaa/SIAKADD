# =============================================================
# SIAKAD — Mutations (Create / Update / Delete)
# =============================================================

# -------------------------------------------------------
# PENGGUNA MUTATIONS
# -------------------------------------------------------

mutation CreatePengguna(
  $email: String!
  $password: String
  $nama: String!
  $peran: PeranPengguna!
  $telepon: String
  $alamat: String
  $fotoUrl: String
) @auth(level: PUBLIC) {
  pengguna_insert(data: {
    email: $email
    password: $password
    nama: $nama
    peran: $peran
    telepon: $telepon
    alamat: $alamat
    fotoUrl: $fotoUrl
  })
}

mutation UpdatePengguna(
  $id: UUID!
  $password: String
  $nama: String
  $telepon: String
  $alamat: String
  $fotoUrl: String
) @auth(level: PUBLIC) {
  pengguna_update(id: $id, data: {
    password: $password
    nama: $nama
    telepon: $telepon
    alamat: $alamat
    fotoUrl: $fotoUrl
  })
}

mutation DeletePengguna($id: UUID!) @auth(level: PUBLIC) {
  pengguna_delete(id: $id)
}

# -------------------------------------------------------
# GURU MUTATIONS
# -------------------------------------------------------

mutation CreateGuru(
  $penggunaId: UUID!
  $nip: String!
  $jenisKelamin: JenisKelamin!
  $tempatLahir: String
  $tanggalLahir: Date
  $jabatan: JabatanGuru
  $spesialisasi: String
) @auth(level: PUBLIC) {
  guru_insert(data: {
    penggunaId: $penggunaId
    nip: $nip
    jenisKelamin: $jenisKelamin
    tempatLahir: $tempatLahir
    tanggalLahir: $tanggalLahir
    jabatan: $jabatan
    spesialisasi: $spesialisasi
  })
}

mutation UpdateGuru(
  $id: UUID!
  $jabatan: JabatanGuru
  $spesialisasi: String
  $tempatLahir: String
  $tanggalLahir: Date
) @auth(level: PUBLIC) {
  guru_update(id: $id, data: {
    jabatan: $jabatan
    spesialisasi: $spesialisasi
    tempatLahir: $tempatLahir
    tanggalLahir: $tanggalLahir
  })
}

mutation DeleteGuru($id: UUID!) @auth(level: PUBLIC) {
  guru_delete(id: $id)
}

# -------------------------------------------------------
# SISWA MUTATIONS
# -------------------------------------------------------

mutation CreateSiswa(
  $penggunaId: UUID!
  $nis: String!
  $jenisKelamin: JenisKelamin!
  $tempatLahir: String
  $tanggalLahir: Date
  $alamat: String
  $jurusanId: UUID
  $kelasId: UUID
  $tahunMasuk: Int
) @auth(level: PUBLIC) {
  siswa_insert(data: {
    penggunaId: $penggunaId
    nis: $nis
    jenisKelamin: $jenisKelamin
    tempatLahir: $tempatLahir
    tanggalLahir: $tanggalLahir
    alamat: $alamat
    jurusanId: $jurusanId
    kelasId: $kelasId
    tahunMasuk: $tahunMasuk
  })
}

mutation UpdateSiswa(
  $id: UUID!
  $jurusanId: UUID
  $kelasId: UUID
  $tanggalLahir: Date
  $tempatLahir: String
  $alamat: String
) @auth(level: PUBLIC) {
  siswa_update(id: $id, data: {
    jurusanId: $jurusanId
    kelasId: $kelasId
    tanggalLahir: $tanggalLahir
    tempatLahir: $tempatLahir
    alamat: $alamat
  })
}

mutation UpdateSiswaPeminatan(
  $id: UUID!
  $peminatanId: UUID
) @auth(level: PUBLIC) {
  siswa_update(id: $id, data: {
    peminatanId: $peminatanId
  })
}

mutation DeleteSiswa($id: UUID!) @auth(level: PUBLIC) {
  siswa_delete(id: $id)
}

